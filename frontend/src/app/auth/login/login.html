<div class="admin-login" role="main">
  <div class="admin-login__bg" aria-hidden="true"></div>
  <div class="admin-login__card">
    <h1 class="admin-login__title">Inicio de sesión</h1>
    <form class="admin-login__form" (ngSubmit)="iniciarSesion()">
      <div class="admin-login__field">
        <label for="login-email">Ingrese su email:</label>
        <input
          id="login-email"
          class="admin-login__input"
          type="email"
          [(ngModel)]="email"
          name="loginEmail"
          autocomplete="username"
          placeholder="correo@empresa.com"
        />
      </div>
      <div class="admin-login__field">
        <label for="login-password">Ingrese su contraseña:</label>
        <input
          id="login-password"
          class="admin-login__input"
          type="password"
          [(ngModel)]="password"
          name="loginPassword"
          autocomplete="current-password"
          placeholder="Su contraseña"
        />
      </div>
      <label class="admin-login__remember">
        <input
          type="checkbox"
          class="admin-login__checkbox"
          name="staySignedIn"
          autocomplete="off"
          [(ngModel)]="staySignedIn"
        />
        <span>Mantener la sesión iniciada</span>
      </label>
      <button type="submit" class="admin-login__submit">
        Ingresar a la plataforma
      </button>
    </form>
  </div>
</div>
